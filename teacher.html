    <h1>学校管理者向け案内</h1>
    <p>Word Blaster Quest は、ブラウザ上で動作する英単語学習ゲームです。</p>
    <ul>
      <li>外部CDN、外部画像、外部APIを使用しません。</li>
      <li>生徒端末への手動ダウンロードは不要です。</li>
      <li>ゲームの進行記録はブラウザ内のローカル保存のみを使用します。</li>
      <li>公開版には広告タグやアクセス解析タグを含めていません。</li>
    </ul>
    <p>学校管理下のChromebookでURL制限がある場合は、このサイトの公開URLを許可リストに追加してください。</p>
    <p><a href="./">ゲームを開く</a></p>
  </main>
